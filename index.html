<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🖖 Yes or No?</title>
<link href="https://fonts.googleapis.com/css2?family=Righteous&family=Nunito:wght@300;400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --yes: #00e676;
    --no: #ff1744;
    --neutral: #7c4dff;
  }

  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    font-family: 'Nunito', sans-serif;
    background: #0a0a0f;
    overflow: hidden;
    cursor: none;
  }

  /* Custom cursor */
  .cursor {
    position: fixed;
    width: 20px;
    height: 20px;
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    mix-blend-mode: screen;
    transition: transform 0.1s, background 0.3s;
    background: white;
    transform: translate(-50%, -50%);
  }

  /* Animated background blobs */
  .bg {
    position: fixed;
    inset: 0;
    z-index: 0;
    overflow: hidden;
  }

  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(80px);
    opacity: 0.35;
    animation: float linear infinite;
  }

  .blob:nth-child(1) { width: 500px; height: 500px; background: #ff006e; top: -100px; left: -100px; animation-duration: 18s; }
  .blob:nth-child(2) { width: 400px; height: 400px; background: #3a86ff; top: 30%; right: -80px; animation-duration: 22s; animation-delay: -4s; }
  .blob:nth-child(3) { width: 350px; height: 350px; background: #8338ec; bottom: -80px; left: 20%; animation-duration: 16s; animation-delay: -8s; }
  .blob:nth-child(4) { width: 300px; height: 300px; background: #06d6a0; bottom: 10%; right: 10%; animation-duration: 20s; animation-delay: -12s; }
  .blob:nth-child(5) { width: 250px; height: 250px; background: #ffbe0b; top: 40%; left: 30%; animation-duration: 25s; animation-delay: -6s; }

  @keyframes float {
    0%   { transform: translate(0, 0) scale(1); }
    25%  { transform: translate(40px, -30px) scale(1.05); }
    50%  { transform: translate(-20px, 40px) scale(0.95); }
    75%  { transform: translate(-40px, -20px) scale(1.08); }
    100% { transform: translate(0, 0) scale(1); }
  }

  /* Confetti particles */
  .confetti-container {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 5;
  }

  .particle {
    position: absolute;
    width: 10px;
    height: 10px;
    border-radius: 2px;
    opacity: 0;
    animation: confettiFall 1.4s ease-in forwards;
  }

  @keyframes confettiFall {
    0%   { opacity: 1; transform: translateY(-20px) rotate(0deg); }
    100% { opacity: 0; transform: translateY(500px) rotate(720deg); }
  }

  /* Main card */
  .card {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 3rem 3.5rem;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 32px;
    backdrop-filter: blur(20px);
    box-shadow: 0 0 80px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.12);
    max-width: 480px;
    width: 90%;
  }

  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    margin-bottom: 2rem;
    font-weight: 300;
  }

  /* The big answer */
  .answer-wrap {
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 2rem;
    position: relative;
  }

  .answer {
    font-family: 'Righteous', cursive;
    font-size: 130px;
    line-height: 1;
    letter-spacing: 0.02em;
    color: rgba(255,255,255,0.12);
    transition: color 0.4s, text-shadow 0.4s;
    user-select: none;
    position: relative;
  }

  .answer.yes {
    color: var(--yes);
    text-shadow: 0 0 40px var(--yes), 0 0 80px rgba(0,230,118,0.4);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  .answer.no {
    color: var(--no);
    text-shadow: 0 0 40px var(--no), 0 0 80px rgba(255,23,68,0.4);
    animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }

  @keyframes pop {
    0%   { transform: scale(0.3) rotate(-10deg); opacity: 0; }
    60%  { transform: scale(1.1) rotate(3deg); }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }

  /* Button */
  .btn {
    position: relative;
    font-family: 'Righteous', cursive;
    font-size: 18px;
    letter-spacing: 0.1em;
    padding: 16px 52px;
    border: none;
    border-radius: 100px;
    cursor: none;
    background: linear-gradient(135deg, #ff006e, #8338ec, #3a86ff);
    background-size: 200% 200%;
    color: white;
    animation: gradShift 4s ease infinite;
    transition: transform 0.15s, box-shadow 0.3s;
    box-shadow: 0 4px 30px rgba(131,56,236,0.5);
    overflow: hidden;
  }

  .btn::after {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: inherit;
    background: rgba(255,255,255,0);
    transition: background 0.2s;
  }

  .btn:hover::after { background: rgba(255,255,255,0.12); }
  .btn:hover { transform: scale(1.05); box-shadow: 0 8px 40px rgba(131,56,236,0.7); }
  .btn:active { transform: scale(0.97); }

  @keyframes gradShift {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Streak dots */
  .streak {
    display: flex;
    gap: 7px;
    justify-content: center;
    margin-top: 2rem;
    flex-wrap: wrap;
    min-height: 16px;
  }

  .dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    animation: dotPop 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }

  .dot.yes { background: var(--yes); box-shadow: 0 0 8px var(--yes); }
  .dot.no  { background: var(--no);  box-shadow: 0 0 8px var(--no);  }

  @keyframes dotPop { from { transform: scale(0); } to { transform: scale(1); } }

  /* Stats */
  .stats {
    display: flex;
    justify-content: center;
    gap: 2rem;
    margin-top: 1.2rem;
    font-size: 12px;
    letter-spacing: 0.08em;
    color: rgba(255,255,255,0.35);
    font-weight: 300;
  }

  .stats span { display: flex; align-items: center; gap: 5px; }
  .stat-dot { width: 7px; height: 7px; border-radius: 50%; }
  .stat-dot.y { background: var(--yes); }
  .stat-dot.n { background: var(--no); }
  .stat-num { font-weight: 700; color: rgba(255,255,255,0.6); }

  /* Spinning ring during roll */
  .ring {
    position: absolute;
    width: 160px;
    height: 160px;
    border-radius: 50%;
    border: 2px dashed rgba(255,255,255,0.15);
    animation: spin 3s linear infinite;
    pointer-events: none;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .ring2 {
    width: 200px;
    height: 200px;
    border-color: rgba(255,255,255,0.07);
    animation: spin 5s linear infinite reverse;
  }

  .title {
    font-family: 'Righteous', cursive;
    font-size: 15px;
    color: rgba(255,255,255,0.5);
    letter-spacing: 0.15em;
    margin-bottom: 0.3rem;
  }
</style>
</head>
<body>

<div class="cursor" id="cursor"></div>

<div class="bg">
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
  <div class="blob"></div>
</div>

<div class="confetti-container" id="confetti"></div>

<div class="card">
  <p class="eyebrow">Let the universe decide</p>

  <div class="answer-wrap">
    <div class="ring"></div>
    <div class="ring ring2"></div>
    <div class="answer" id="answer">?</div>
  </div>

  <button class="btn" id="btn" onclick="roll()">Ask Now</button>

  <div class="streak" id="streak"></div>

  <div class="stats" id="stats" style="opacity:0;transition:opacity 0.5s;">
    <span><span class="stat-dot y"></span> YES <span class="stat-num" id="yc">0</span></span>
    <span><span class="stat-dot n"></span> NO <span class="stat-num" id="nc">0</span></span>
  </div>
</div>

<script>
  // Cursor
  const cursor = document.getElementById('cursor');
  document.addEventListener('mousemove', e => {
    cursor.style.left = e.clientX + 'px';
    cursor.style.top  = e.clientY + 'px';
  });

  let yes = 0, no = 0, history = [], rolling = false;
  const confettiColors = ['#ff006e','#3a86ff','#8338ec','#06d6a0','#ffbe0b','#ff9f1c','#00e676','#ff1744'];

  function roll() {
    if (rolling) return;
    rolling = true;

    const btn = document.getElementById('btn');
    const ansEl = document.getElementById('answer');
    btn.disabled = true;

    ansEl.className = 'answer';
    ansEl.style.color = 'rgba(255,255,255,0.12)';
    ansEl.style.textShadow = 'none';

    let ticks = 0;
    const max = 14 + Math.floor(Math.random() * 10);

    const iv = setInterval(() => {
      ansEl.textContent = Math.random() > 0.5 ? 'YES' : 'NO';
      ticks++;
      if (ticks >= max) {
        clearInterval(iv);
        const result = Math.random() < 0.5 ? 'YES' : 'NO';
        finish(result);
        rolling = false;
        btn.disabled = false;
      }
    }, 55);
  }

  function finish(result) {
    const ansEl = document.getElementById('answer');
    ansEl.textContent = result;
    ansEl.className = 'answer ' + result.toLowerCase();

    if (result === 'YES') { yes++; spawnConfetti(); }
    else no++;

    document.getElementById('yc').textContent = yes;
    document.getElementById('nc').textContent = no;
    document.getElementById('stats').style.opacity = '1';

    history.push(result);
    if (history.length > 18) history.shift();
    renderStreak();
  }

  function renderStreak() {
    const el = document.getElementById('streak');
    el.innerHTML = history.map((h, i) =>
      `<div class="dot ${h.toLowerCase()}" style="animation-delay:${i * 0.03}s"></div>`
    ).join('');
  }

  function spawnConfetti() {
    const c = document.getElementById('confetti');
    for (let i = 0; i < 40; i++) {
      const p = document.createElement('div');
      p.className = 'particle';
      p.style.left = (20 + Math.random() * 60) + '%';
      p.style.top = (Math.random() * 30) + '%';
      p.style.background = confettiColors[Math.floor(Math.random() * confettiColors.length)];
      p.style.width = (6 + Math.random() * 10) + 'px';
      p.style.height = (6 + Math.random() * 10) + 'px';
      p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
      p.style.animationDelay = (Math.random() * 0.5) + 's';
      p.style.animationDuration = (1 + Math.random() * 0.8) + 's';
      c.appendChild(p);
      setTimeout(() => p.remove(), 2200);
    }
  }

  // Space bar shortcut
  document.addEventListener('keydown', e => { if (e.code === 'Space') { e.preventDefault(); roll(); }});
</script>
</body>
</html>
